name: CI

on:
  push:
  pull_request:

jobs:
  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PipeWire build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libpipewire-0.3-dev libspa-0.2-dev
      - run: cargo test -p wavelinux-model -p wavelinux-pw -p wavelinux-engine

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - run: corepack prepare yarn@1.22.22 --activate
      - run: yarn install --frozen-lockfile
      - run: yarn web:build
