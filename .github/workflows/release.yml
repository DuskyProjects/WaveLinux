name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            desktop-file-utils \
            file \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            patchelf \
            squashfs-tools \
            swh-plugins \
            zsync
          sudo apt-get install -y librnnoise-ladspa || true

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyInstaller PyQt6 cryptography

      - name: Run syntax checks
        run: |
          python -m py_compile \
            main.py \
            distribution.py \
            pipewire_engine.py \
            wavelinux_theme.py \
            audio_runtime/*.py

      - name: Run test suite
        run: python -m unittest discover -s tests

      - name: Build AppImage
        run: ./scripts/build_appimage.sh

      - name: Smoke test AppImage
        run: |
          APPIMAGE="$(echo dist/*.AppImage)"
          chmod +x "$APPIMAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --version
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --self-test

      - name: Build signed release manifest
        run: |
          APPIMAGE="$(echo dist/*.AppImage)"
          if [ "${GITHUB_REF}" = "${GITHUB_REF#refs/tags/}" ]; then
            RELEASE_TAG="v$(python -c "import re; from pathlib import Path; text = Path('main.py').read_text(encoding='utf-8'); match = re.search(r'^APP_VERSION = \\\"([^\\\"]+)\\\"', text, re.MULTILINE); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit('Could not determine APP_VERSION from main.py')))")"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          python scripts/build_release_manifest.py \
            --appimage "$APPIMAGE" \
            --version "${RELEASE_TAG#v}" \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${RELEASE_TAG}" \
            --output dist/wavelinux-release-manifest.json

      - name: Sign release manifest
        env:
          WAVELINUX_RELEASE_ED25519_PRIVATE_KEY_B64: ${{ secrets.WAVELINUX_RELEASE_ED25519_PRIVATE_KEY_B64 }}
        run: |
          python scripts/sign_release_manifest.py \
            dist/wavelinux-release-manifest.json \
            dist/wavelinux-release-manifest.sig

      - name: Verify manifest acceptance path
        run: |
          APPIMAGE="$(echo dist/*.AppImage)"
          python scripts/verify_release_manifest.py \
            dist/wavelinux-release-manifest.json \
            dist/wavelinux-release-manifest.sig \
            "$APPIMAGE"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wavelinux-appimage
          path: |
            dist/*.AppImage
            dist/sha256sums.txt
            dist/wavelinux-release-manifest.json
            dist/wavelinux-release-manifest.sig

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/sha256sums.txt
            dist/wavelinux-release-manifest.json
            dist/wavelinux-release-manifest.sig
