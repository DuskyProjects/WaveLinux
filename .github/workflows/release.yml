name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            desktop-file-utils \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            squashfs-tools \
            libpipewire-0.3-dev \
            libspa-0.2-dev

      - run: corepack enable
      - run: corepack prepare yarn@1.22.22 --activate
      - run: yarn install --frozen-lockfile
      - run: cargo test -p wavelinux-model -p wavelinux-pw -p wavelinux-engine
      - run: yarn web:build

      - name: Build deb, rpm, AppImage, and updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: "0"
        run: yarn desktop:release

      - name: Build updater latest.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ARTIFACT="$(find target/release/bundle/appimage \( -name '*.AppImage.tar.gz' -o -name '*.AppImage' \) | sort | head -n 1)"
          python3 scripts/build-updater-manifest.py \
            --artifact "$ARTIFACT" \
            --version "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$TAG" \
            --output target/release/bundle/latest.json \
            --notes "WaveLinux $VERSION"

      - name: Build signed hardware profile assets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-hardware-profile-assets.sh

      - name: Stage AUR package metadata
        run: bash scripts/build-aur.sh

      - name: Stage release upload files
        run: |
          mkdir -p target/release/upload
          cp target/release/bundle/appimage/*.AppImage* target/release/upload/
          cp target/release/bundle/deb/*.deb* target/release/upload/
          cp target/release/bundle/rpm/*.rpm* target/release/upload/
          cp target/release/bundle/latest.json target/release/upload/
          cp target/aur/wavelinux/PKGBUILD target/release/upload/
          cp target/aur/wavelinux/.SRCINFO target/release/upload/wavelinux.SRCINFO
          cp target/hardware-profiles/v1/*.json* target/release/upload/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wavelinux-linux-bundles
          path: target/release/upload/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: WaveLinux ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, 'pre') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: target/release/upload/*

      - name: Publish moving beta update feed
        if: startsWith(github.ref, 'refs/tags/') && (contains(github.ref_name, 'pre') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f prerelease "$GITHUB_SHA"
          git push origin refs/tags/prerelease --force
          if gh release view prerelease >/dev/null 2>&1; then
            gh release edit prerelease \
              --title "WaveLinux prerelease" \
              --notes "Latest WaveLinux beta/prerelease build." \
              --prerelease
            gh release upload prerelease target/release/upload/* --clobber
          else
            gh release create prerelease target/release/upload/* \
              --target "$GITHUB_SHA" \
              --title "WaveLinux prerelease" \
              --notes "Latest WaveLinux beta/prerelease build." \
              --prerelease
          fi
