name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-bundles:
    if: ${{ github.event_name != 'push' || github.event.deleted != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            desktop-file-utils \
            file \
            libayatana-appindicator3-dev \
            libcap2 \
            libgtk-3-dev \
            librsvg2-dev \
            libusb-1.0-0 \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            squashfs-tools \
            bubblewrap \
            xdg-dbus-proxy \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libpipewire-0.3-dev \
            libspa-0.2-dev

      - name: Install LADSPA effect plugins for AppImage staging
        run: |
          sudo apt-get install -y swh-plugins || true
          sudo apt-get install -y librnnoise-ladspa || true
          sudo apt-get install -y deepfilternet-ladspa || true

      - run: corepack enable
      - run: corepack prepare yarn@1.22.22 --activate
      - run: yarn install --frozen-lockfile
      - run: cargo test -p wavelinux-model -p wavelinux-pw -p wavelinux-engine
      - run: yarn web:build

      - name: Build deb, rpm, AppImage, and updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: "0"
        run: yarn desktop:release

      - name: Build updater latest.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          FEED_TAG="$TAG"
          if [[ "$TAG" == *pre* || "$TAG" == *beta* || "$TAG" == *rc* || "$TAG" == *testing* || "$TAG" == *Testing* ]]; then
            FEED_TAG="prerelease"
          fi
          ARTIFACT="$(find target/release/bundle/appimage \( -name '*.AppImage.tar.gz' -o -name '*.AppImage' \) | sort | head -n 1)"
          python3 scripts/build-updater-manifest.py \
            --artifact "$ARTIFACT" \
            --version "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$FEED_TAG" \
            --output target/release/bundle/latest.json \
            --notes "WaveLinux $VERSION"

      - name: Build signed hardware profile assets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-hardware-profile-assets.sh

      - name: Stage AUR package metadata
        run: bash scripts/build-aur.sh

      - name: Stage release upload files
        run: |
          mkdir -p target/release/upload
          cp target/release/bundle/appimage/*.AppImage* target/release/upload/
          cp target/release/bundle/deb/*.deb* target/release/upload/
          cp target/release/bundle/rpm/*.rpm* target/release/upload/
          cp target/release/bundle/latest.json target/release/upload/
          cp target/aur/wavelinux/PKGBUILD target/release/upload/
          cp target/aur/wavelinux/.SRCINFO target/release/upload/wavelinux.SRCINFO
          cp target/hardware-profiles/v1/*.json* target/release/upload/

      - name: Prepare GitHub release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_VERSION="${VERSION%%-*}"
          mkdir -p target/release
          awk -v version="$NOTES_VERSION" '
            $0 == "# WaveLinux " version { in_section = 1; found = 1 }
            in_section && /^# WaveLinux / && $0 != "# WaveLinux " version { exit }
            in_section { print }
            END { if (!found) exit 1 }
          ' RELEASE_NOTES.md > target/release/release-notes.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wavelinux-linux-bundles
          path: target/release/upload/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/') && !(contains(github.ref_name, 'pre') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'testing') || contains(github.ref_name, 'Testing'))
        uses: softprops/action-gh-release@v3
        with:
          name: WaveLinux ${{ github.ref_name }}
          body_path: target/release/release-notes.md
          prerelease: false
          files: target/release/upload/*

      - name: Prune older GitHub release pages
        if: startsWith(github.ref, 'refs/tags/') && !(contains(github.ref_name, 'pre') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'testing') || contains(github.ref_name, 'Testing'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TAG="$GITHUB_REF_NAME"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' |
            while IFS= read -r tag; do
              [[ -z "$tag" || "$tag" == "$CURRENT_TAG" ]] && continue
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" -y
            done

          if git ls-remote --exit-code --tags origin refs/tags/prerelease >/dev/null 2>&1; then
            git push origin ":refs/tags/prerelease"
          fi

      - name: Publish moving testing update feed
        if: startsWith(github.ref, 'refs/tags/') && (contains(github.ref_name, 'pre') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'testing') || contains(github.ref_name, 'Testing'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DISPLAY_VERSION="${VERSION%%-*}"
          TITLE="WaveLinux ${DISPLAY_VERSION} Testing"

          git tag -f prerelease "$GITHUB_SHA"
          git push origin refs/tags/prerelease --force
          if gh release view prerelease >/dev/null 2>&1; then
            gh release view prerelease --json assets -q '.assets[].name' |
              while IFS= read -r asset; do
                [[ -n "$asset" ]] && gh release delete-asset prerelease "$asset" -y
              done
            gh release edit prerelease \
              --title "$TITLE" \
              --notes-file target/release/release-notes.md \
              --prerelease
            gh release upload prerelease target/release/upload/* --clobber
          else
            gh release create prerelease target/release/upload/* \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file target/release/release-notes.md \
              --prerelease
          fi

          if [[ "$GITHUB_REF_NAME" != "prerelease" ]]; then
            git push origin ":refs/tags/${GITHUB_REF_NAME}" || true
          fi
